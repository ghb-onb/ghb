<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>明朝大事记 · 全编年史卷轴 | 自动滚动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2a241e;
            background-image: radial-gradient(circle at 15% 30%, rgba(90, 65, 50, 0.5) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(70, 50, 40, 0.4) 1.5%, transparent 2%);
            background-size: 56px 56px, 40px 40px;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', '宋体', 'STKaiti', 'KaiTi', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* 主卡片：古宣纸质感 */
        .chronicle-card {
            max-width: 820px;
            width: 100%;
            background: #fef7e8;
            background: linear-gradient(145deg, #fff8ed 0%, #f9efdd 100%);
            border-radius: 2.5rem 1.2rem 2.5rem 1.2rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 250, 210, 0.9);
            overflow: hidden;
            border: 1px solid #e2caa3;
        }

        /* 卷轴题跋 */
        .title-section {
            background: #5c3e2b;
            background: linear-gradient(135deg, #6b4c34, #4e3322);
            padding: 1.4rem 1rem;
            text-align: center;
            border-bottom: 3px solid #dbb87c;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .title-section h1 {
            font-size: 2.2rem;
            letter-spacing: 6px;
            color: #ffefc0;
            text-shadow: 3px 3px 0 #2f1e12;
            font-weight: 600;
        }

        .title-section p {
            color: #f3deba;
            font-size: 0.85rem;
            margin-top: 8px;
            letter-spacing: 2px;
            font-style: italic;
        }

        .title-section::before,
        .title-section::after {
            content: "☯";
            font-size: 1.2rem;
            color: #e9c891;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.4;
        }
        .title-section::before { left: 20px; }
        .title-section::after { right: 20px; }

        /* 滚动区域 */
        .scroll-container {
            position: relative;
            height: 540px;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding: 0.6rem 1rem 1.2rem 1rem;
            background: rgba(250, 242, 220, 0.4);
            scrollbar-width: thin;
            scrollbar-color: #c7a87b #f1e5cf;
        }
        .scroll-container::-webkit-scrollbar {
            width: 6px;
            background: #eedfc5;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #b48b5a;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #8f623c;
        }

        /* 大事记列表 */
        .timeline-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* 事件卡片 */
        .event-item {
            background: #fffef7;
            border-left: 8px solid #b4662c;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .event-item:hover {
            transform: translateX(5px);
            background: #fffbf0;
            border-left-color: #d48f46;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .event-year {
            font-size: 1.35rem;
            font-weight: bold;
            color: #b45a2b;
            display: inline-block;
            border-bottom: 2px dotted #e9c07a;
            margin-bottom: 0.4rem;
            font-family: 'Times New Roman', '华文楷书', serif;
            letter-spacing: 1px;
        }

        .event-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #3e2a21;
            margin: 0.3rem 0 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .event-title:before {
            content: "◆";
            font-size: 0.85rem;
            color: #c1813b;
        }

        .event-desc {
            font-size: 0.9rem;
            line-height: 1.48;
            color: #4f3a2c;
            text-align: justify;
        }

        /* 底部控制栏 */
        .scroll-footer {
            background: #ecdbba;
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid #ddc7a8;
            font-size: 0.75rem;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff2e2;
            padding: 4px 12px;
            border-radius: 48px;
        }

        .status-badge {
            background: #4f2f1c;
            color: #ffefcf;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: normal;
        }

        button {
            background: #7b563a;
            border: none;
            color: #fdf1df;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        button:hover {
            background: #9b6e4a;
            transform: scale(0.96);
        }

        .speed-slider {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff6ea;
            padding: 0 10px;
            border-radius: 40px;
        }
        .speed-slider label {
            font-size: 0.7rem;
            color: #4f311e;
            font-weight: bold;
        }
        input[type="range"] {
            width: 110px;
            height: 3px;
            -webkit-appearance: none;
            background: #dbb87c;
            border-radius: 5px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #8f5e3a;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        .speed-value {
            font-size: 0.7rem;
            background: #e9dccd;
            padding: 2px 6px;
            border-radius: 20px;
            min-width: 42px;
            text-align: center;
            font-weight: bold;
            color: #5a3a24;
        }

        @media (max-width: 600px) {
            .scroll-container { height: 460px; }
            .event-title { font-size: 1rem; }
            .event-year { font-size: 1.1rem; }
            .title-section h1 { font-size: 1.6rem; }
            .control-group { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="chronicle-card">
    <div class="title-section">
        <h1>明 · 大事记</h1>
        <p>洪武开天 永乐扬帆 三百载山河 编年尽览</p>
    </div>

    <div class="scroll-container" id="scrollContainer">
        <div class="timeline-list" id="timelineList"></div>
    </div>

    <div class="scroll-footer">
        <div class="control-group">
            <span class="status-badge" id="scrollStatus">📜 滚动中</span>
            <button id="toggleScrollBtn">⏸️ 暂停</button>
        </div>
        <div class="speed-slider">
            <label>⚡ 滚动速度</label>
            <input type="range" id="speedSlider" min="0.5" max="2.8" step="0.05" value="1.5">
            <span id="speedValue" class="speed-value">1.5x</span>
        </div>
        <div class="control-group">
            <span>🖱️ 悬停即停 · 回顶循环</span>
        </div>
    </div>
</div>

<script>

    const eventsData = [

        { year: "1402年", title: "靖难之役·永乐即位", desc: "燕王朱棣攻占南京，建文帝失踪，朱棣即位，改元永乐，史称明成祖。" },
        { year: "1405-1433年", title: "郑和下西洋", desc: "郑和七次下西洋，远航至东南亚、印度洋、非洲东海岸，扬大明国威。" },
        { year: "1406年", title: "营建北京城", desc: "开始大规模营建北京城及紫禁城。" },
        { year: "1407年", title: "永乐大典", desc: "《永乐大典》编纂完成，中国古代最大的类书。" },

        // 三、由盛转衰 (1436-1521)

    let manualPausedByUser = false;
    let isMouseOverContainer = false;

    // 渲染全部大事记
    function renderTimeline() {
        timelineList.innerHTML = '';
        eventsData.forEach(event => {
            const eventDiv = document.createElement('div');
            eventDiv.className = 'event-item';
            eventDiv.innerHTML = `
                <div class="event-year">📜 ${event.year}</div>
                <div class="event-title">${event.title}</div>
                <div class="event-desc">${event.desc}</div>
            `;
            timelineList.appendChild(eventDiv);
        });
    }

    // 滚动一步
    function performScrollStep() {
        if (isPaused || isResetting) return;
        if (!scrollContainer) return;

        let { scrollTop, scrollHeight, clientHeight } = getScrollMetrics();
        const atBottom = scrollTop + clientHeight + 1 >= scrollHeight;
        
        if (atBottom) {
            if (!isResetting) {
                stopAutoScroll();
                startResetAndRoll();
            }
            return;
        }
        let newScrollTop = Math.min(scrollTop + currentSpeed, scrollHeight - clientHeight);
        scrollContainer.scrollTop = newScrollTop;
    }

    function getScrollMetrics() {
        if (!scrollContainer) return { scrollTop: 0, scrollHeight: 0, clientHeight: 0 };
        return {
            scrollTop: scrollContainer.scrollTop,
            scrollHeight: scrollContainer.scrollHeight,
            clientHeight: scrollContainer.clientHeight
        };
    }

    function stopAutoScroll() {
        if (autoScrollInterval) {
            clearInterval(autoScrollInterval);
            autoScrollInterval = null;
        }
    }

    function startAutoScroll() {
        if (autoScrollInterval) stopAutoScroll();
        if (!isPaused && !isResetting) {
            autoScrollInterval = setInterval(() => {
                performScrollStep();
            }, frameInterval);
            updateStatusText();
        } else {
            updateStatusText();
        }
    }

    function updateStatusText() {
        if (!scrollStatusSpan) return;
        if (isResetting) scrollStatusSpan.innerText = '🔄 重置回顶';
        else if (isPaused) {
            if (manualPausedByUser) scrollStatusSpan.innerText = '⏸️ 手动暂停';
            else if (isMouseOverContainer) scrollStatusSpan.innerText = '⏸️ 悬停暂停';
            else scrollStatusSpan.innerText = '⏸️ 已暂停';
        } else {
            scrollStatusSpan.innerText = '📜 滚动中';
        }
    }

    // 重置到顶部并继续滚动
    function startResetAndRoll() {
        if (isResetting) return;
        isResetting = true;
        stopAutoScroll();
        updateStatusText();
        if (resetTimer) clearTimeout(resetTimer);
        if (scrollContainer) scrollContainer.scrollTop = 0;
        resetTimer = setTimeout(() => {
            isResetting = false;
            if (!isPaused) {
                startAutoScroll();
            } else {
                updateStatusText();
            }
            resetTimer = null;
        }, 260);
    }

    // 暂停滚动 (不改变手动标志)
    function pauseAutoScroll() {
        if (isPaused) return;
        isPaused = true;
        stopAutoScroll();
        updateStatusText();
    }

    function resumeAutoScroll() {
        if (!isPaused) return;
        isPaused = false;
        if (isResetting) {
            updateStatusText();
            return;
        }
        startAutoScroll();
    }

    // 手动切换按钮 (用户主动暂停/启动)
    function toggleManualScroll() {
        if (manualPausedByUser) {
            // 当前手动暂停 -> 恢复自动
            manualPausedByUser = false;
            // 如果鼠标正在悬浮，则自动恢复会被悬浮逻辑再次暂停，但此时应该尊重悬浮优先？按照设计，悬浮时应当暂停，所以如果鼠标在容器内，恢复后立刻被悬停暂停
            if (isMouseOverContainer) {
                // 鼠标悬停，自动模式也会被悬停强制暂停，所以最终状态应为暂停（悬停原因）
                if (!isPaused) pauseAutoScroll();
                toggleBtn.innerHTML = '⏸️ 暂停';
                updateStatusText();
            } else {
                resumeAutoScroll();
                toggleBtn.innerHTML = '⏸️ 暂停';
            }
        } else {
            // 自动模式 -> 手动暂停
            manualPausedByUser = true;
            pauseAutoScroll();
            toggleBtn.innerHTML = '▶️ 启动';
            updateStatusText();
        }
    }

    // 鼠标悬浮逻辑
    function handleMouseEnter() {
        isMouseOverContainer = true;
        if (!manualPausedByUser) {
            pauseAutoScroll();
        } else {
            // 手动暂停模式保持暂停，仅更新文案
            updateStatusText();
        }
    }

    function handleMouseLeave() {
        isMouseOverContainer = false;
        if (!manualPausedByUser) {
            resumeAutoScroll();
        } else {
            updateStatusText();
        }
    }

    // 速度调节
    function updateSpeed() {
        let newSpeed = parseFloat(speedSlider.value);
        currentSpeed = newSpeed;
        speedValueSpan.innerText = currentSpeed.toFixed(2) + 'x';
        // 速度变化无需重启定时器，下次滚动步进生效
    }

    // 初始化滚动与监听
    function init() {
        renderTimeline();
        scrollContainer.scrollTop = 0;
        isPaused = false;
        isResetting = false;
        manualPausedByUser = false;
        isMouseOverContainer = false;
        stopAutoScroll();
        startAutoScroll();

        toggleBtn.innerHTML = '⏸️ 暂停';
        toggleBtn.onclick = toggleManualScroll;
        scrollContainer.addEventListener('mouseenter', handleMouseEnter);
        scrollContainer.addEventListener('mouseleave', handleMouseLeave);
        
        speedSlider.addEventListener('input', updateSpeed);
        updateSpeed();

        // 页面可见性优化
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (autoScrollInterval) stopAutoScroll();
            } else {
                if (!manualPausedByUser && !isMouseOverContainer && !isResetting && !autoScrollInterval) {
                    startAutoScroll();
                }
            }
        });

        // 清理定时器
        window.addEventListener('beforeunload', () => {
            if (autoScrollInterval) clearInterval(autoScrollInterval);
            if (resetTimer) clearTimeout(resetTimer);
        });
    }

    init();
</script>
</body>
</html>
